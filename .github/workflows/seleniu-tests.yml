name: Selenium CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      test_suite:
        description: Select the test suite to run
        required: true
        default: regression
        type: choice
        options:
          - smoke
          - regression

      base_url:
        description: Target application URL
        required: true
        default: https://www.saucedemo.com
        type: string

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.test_suite == 'smoke'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          CI: "true"
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://www.saucedemo.com' }}

      - name: Upload smoke failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.test_suite == 'regression'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run regression tests
        run: npm run test:regression
        env:
          CI: "true"
          BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://www.saucedemo.com' }}

      - name: Upload regression failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7